name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: cmmc-pilot-backend
  FRONTEND_IMAGE: cmmc-pilot-frontend
  ACR_NAME: cmmccopilotacr 
  PRODUCT_DATA_RULE: Azure Commercial is not approved for CUI, ITAR, export-controlled data, classified data, or sensitive government contract information.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Build and push backend image
        run: |
          ACR_LOGIN_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          docker build \
            -f Dockerfile.backend \
            -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest" .
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        run: |
          ACR_LOGIN_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          docker build \
            -f Dockerfile.frontend \
            --build-arg NEXT_BACKEND_URL="${{ secrets.NEXT_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="" \
            -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest" .
          docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest"

      - name: Configure backend app settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}" \
            --settings \
              WEBSITES_PORT=8000 \
              PORT=8000 \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              OPENAI_MODEL="${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}" \
              CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              PRODUCT_DATA_RULE="${{ env.PRODUCT_DATA_RULE }}"

      - name: Deploy backend container
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Configure frontend app settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}" \
            --settings \
              WEBSITES_PORT=3000 \
              PORT=3000 \
              NEXT_BACKEND_URL="${{ secrets.NEXT_BACKEND_URL }}" \
              NEXT_PUBLIC_API_BASE_URL="" \
              PRODUCT_DATA_RULE="${{ env.PRODUCT_DATA_RULE }}"

      - name: Deploy frontend container
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
